<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cianita Semijoias · Painel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;font-size:13px;color:#1a1a1a;background:#fdf6f4;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #f0e4df;padding:0 1.5rem;display:flex;align-items:center;gap:10px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(181,144,107,0.06);flex-wrap:wrap}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:2px;color:#1a1a1a;text-transform:uppercase;white-space:nowrap}
.topbar-logo span{font-weight:400;font-size:11px;letter-spacing:3px;color:#b5906b;display:block;line-height:1;font-family:'Inter',sans-serif;text-transform:uppercase}
select,input,textarea,button{font-family:'Inter',sans-serif;font-size:13px}
select{padding:6px 10px;border-radius:8px;border:1px solid #e8d8d0;background:#fff;color:#1a1a1a;cursor:pointer}
.search-input{padding:6px 10px 6px 30px;border-radius:8px;border:1px solid #e8d8d0;background:#fff;color:#1a1a1a;width:180px}
.search-input:focus{outline:none;border-color:#b5906b}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap i{position:absolute;left:8px;color:#b5906b;font-size:14px}
.btn{padding:7px 14px;border-radius:8px;border:1px solid #e8d8d0;background:#fff;cursor:pointer;font-size:12px;color:#666;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#fdf6f4}
.btn-primary{border-color:#b5906b;background:#fdf0e8;color:#7a5c3a}
.btn-connect{background:#1a1a1a;color:#fff;border-color:#1a1a1a;padding:9px 24px;font-size:13px;font-weight:500;border-radius:8px}
.btn-connect:hover{background:#333}
.btn-sup{border-color:#b5906b;background:#fff;color:#b5906b;font-size:12px;padding:5px 10px}
.btn-sup:hover{background:#fdf0e8}
.main{padding:1.5rem}
.setup-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px)}
.setup-card{background:#fff;border:1px solid #f0e4df;border-radius:16px;padding:2.5rem;width:100%;max-width:460px;box-shadow:0 4px 24px rgba(181,144,107,0.08)}
.setup-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;letter-spacing:3px;text-align:center;margin-bottom:4px;text-transform:uppercase}
.setup-sub-logo{font-size:11px;letter-spacing:4px;color:#b5906b;text-align:center;margin-bottom:2rem;text-transform:uppercase}
.setup-label{font-size:11px;color:#999;margin-bottom:5px;display:block;letter-spacing:0.5px;text-transform:uppercase}
.setup-input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #e8d8d0;font-size:13px;color:#1a1a1a;background:#fdf9f7}
.setup-input:focus{outline:none;border-color:#b5906b}
.setup-field{margin-bottom:16px}
.status-bar{font-size:12px;margin-top:12px;padding:10px 14px;border-radius:8px;display:none;line-height:1.5}
.status-loading{background:#fdf0e8;color:#7a5c3a;display:block}
.status-error{background:#fcebeb;color:#a32d2d;display:block}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.toolbar-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;letter-spacing:1px;margin-right:auto;color:#1a1a1a;white-space:nowrap}
.toolbar-title span{font-size:12px;font-weight:400;color:#b5906b;margin-left:8px;font-family:'Inter',sans-serif}
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start}
@media(max-width:900px){.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.kanban{grid-template-columns:1fr}}
.col{background:#f9f1ee;border-radius:14px;padding:12px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-bottom:8px;border-bottom:1px solid rgba(181,144,107,0.15)}
.col-title{font-weight:600;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;color:#888}
.col-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.col-hint{font-size:10px;color:#b5906b;margin-bottom:10px;line-height:1.4}
.card{background:#fff;border:1px solid #f0e4df;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.card:hover{border-color:#b5906b;box-shadow:0 2px 8px rgba(181,144,107,0.1)}
.card:last-child{margin-bottom:0}
.card-name{font-weight:600;font-size:12px;margin-bottom:5px;color:#1a1a1a}
.card-alert{font-size:10px;margin-top:6px;padding:4px 8px;border-left:2px solid;border-radius:0 6px 6px 0}
.card-alert-warn{background:#faeeda;color:#854f0b;border-color:#ef9f27}
.card-alert-danger{background:#fcebeb;color:#a32d2d;border-color:#e24b4a}
.nivel-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.obs-dot{width:6px;height:6px;border-radius:50%;background:#b5906b;flex-shrink:0}
.acerto-chip{font-size:10px;color:#7a5c3a;background:#fdf0e8;padding:2px 6px;border-radius:20px;display:inline-flex;align-items:center;gap:3px}
.acerto-chip.vencido{color:#a32d2d;background:#fcebeb}
.acerto-chip.hoje{color:#3b6d11;background:#eaf3de}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);z-index:200;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.modal-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid #f0e4df}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
textarea{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #e8d8d0;color:#1a1a1a;resize:vertical;min-height:64px;line-height:1.5;font-family:'Inter',sans-serif;font-size:13px;background:#fdf9f7}
textarea:focus{outline:none;border-color:#b5906b}
.obs-item{background:#fdf6f4;border-radius:8px;padding:9px 11px;margin-bottom:6px;font-size:12px;line-height:1.5}
.obs-item-date{font-size:10px;color:#b5906b;margin-top:3px}
.btn-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.info-cell{background:#fdf6f4;border-radius:8px;padding:9px 11px}
.info-cell-label{font-size:10px;color:#b5906b;text-transform:uppercase;letter-spacing:0.5px}
.info-cell-val{font-size:14px;font-weight:600;margin-top:2px}
.field-label{font-size:10px;color:#b5906b;margin-bottom:5px;margin-top:14px;display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:0.5px}
.acao-item{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #f5ede9;font-size:12px}
.acao-item:last-child{border-bottom:none}
.acao-done{text-decoration:line-through;color:#bbb}
.investig-box{border-left:3px solid;border-radius:0 8px 8px 0;padding:10px 13px;margin-bottom:12px;font-size:12px;line-height:1.5}
.investig-warn{border-color:#ef9f27;background:#faeeda;color:#854f0b}
.investig-danger{border-color:#e24b4a;background:#fcebeb;color:#a32d2d}
.empty-col{font-size:11px;color:#c9a898;text-align:center;padding:16px 0}
.topbar-controls{display:none;align-items:center;gap:8px;flex-wrap:wrap}

/* Modal supervisoras */
.sup-modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.15)}
.sup-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;margin-bottom:4px}
.sup-sub{font-size:12px;color:#999;margin-bottom:1rem;line-height:1.5}
.sup-consultora-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5ede9;gap:8px}
.sup-consultora-item:last-child{border-bottom:none}
.sup-select{padding:5px 8px;border-radius:8px;border:1px solid #e8d8d0;font-size:12px;flex:1;max-width:200px}
.badge-contato{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:500}
.badge-com-contato{background:#eaf3de;color:#3b6d11}
.badge-sem-contato{background:#fcebeb;color:#a32d2d}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Cianita<span>Semijoias</span></div>
  <div class="topbar-controls" id="topbar-controls">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" class="search-input" id="busca-nome" placeholder="Buscar consultora..." oninput="renderKanban()">
    </div>
    <select id="filtro-sup" onchange="renderKanban()">
      <option value="todas">Todas as supervisoras</option>
      <option value="sem">Sem supervisora</option>
    </select>
    <select id="filtro-nivel" onchange="renderKanban()">
      <option value="todos">Todos os níveis</option>
    </select>
    <select id="filtro-contato" onchange="renderKanban()">
      <option value="todos">Todos os contatos</option>
      <option value="com">Com contato no mês</option>
      <option value="sem">Sem contato no mês</option>
    </select>
    <button class="btn btn-sup" onclick="abrirModalSupervisoras()"><i class="ti ti-users"></i> Supervisoras</button>
    <button class="btn" onclick="recarregar()"><i class="ti ti-refresh"></i> Atualizar</button>
    <button class="btn" onclick="sair()"><i class="ti ti-logout"></i> Sair</button>
  </div>
</div>

<div class="main">
  <div id="setup-wrap" class="setup-wrap">
    <div class="setup-card">
      <div class="setup-logo">Cianita</div>
      <div class="setup-sub-logo">Semijoias · Painel</div>
      <div class="setup-field">
        <label class="setup-label">Token de API do Jueri</label>
        <input type="password" class="setup-input" id="token-input" placeholder="Cole seu token aqui..." autocomplete="off">
      </div>
      <button class="btn btn-connect" onclick="iniciarCarregamento()"><i class="ti ti-plug"></i> Conectar</button>
      <div class="status-bar" id="status-bar"></div>
    </div>
  </div>

  <div id="painel" style="display:none">
    <div class="toolbar">
      <div class="toolbar-title">Consultoras <span id="mes-label"></span></div>
    </div>
    <div class="kanban" id="kanban"></div>
  </div>
</div>

<!-- Overlay consultora -->
<div class="overlay" id="overlay" onclick="fecharModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>

<!-- Overlay supervisoras -->
<div class="overlay" id="overlay-sup" onclick="fecharModalSup(event)">
  <div class="sup-modal" id="modal-sup" onclick="event.stopPropagation()"></div>
</div>

<script>
const CLIENTE_ID = '8493';
const PROXY = '/api/jueri/' + CLIENTE_ID;

const NIVEL_STYLE = {
  'BRONZE':      {bg:'#faece7',color:'#712b13'},
  'PRATA':       {bg:'#f1efe8',color:'#555553'},
  'OURO':        {bg:'#faeeda',color:'#633806'},
  'DIAMANTE':    {bg:'#e6f1fb',color:'#0c447c'},
  'EMBAIXADORA': {bg:'#fdf0f5',color:'#72243e'}
};
const SUP_COLORS = [
  {bg:'#e1f5ee',color:'#085041'},
  {bg:'#fbeaf0',color:'#72243e'},
  {bg:'#faeeda',color:'#633806'},
  {bg:'#eeedfe',color:'#3c3489'},
  {bg:'#e6f1fb',color:'#0c447c'},
];
const AVATAR_BG  = ['#f5d5c8','#f4c0d1','#fac775','#c0dd97','#b5d4f4','#cecbf6','#9fe1cb','#f0997b'];
const AVATAR_CLR = ['#7a2e1a','#72243e','#633806','#27500a','#0c447c','#3c3489','#085041','#993c1d'];
const COLUNAS = [
  {id:'zerada',         label:'Zeradas',           hint:'Kit bipado, sem vendas no mês.',               countBg:'#fcebeb',countClr:'#a32d2d'},
  {id:'abaixo',         label:'Abaixo de R$ 500',  hint:'Abaixo do mínimo — frete por conta delas.',    countBg:'#faeeda',countClr:'#854f0b'},
  {id:'acima',          label:'Acima de R$ 500',   hint:'Operação regular dentro do consignado.',        countBg:'#eaf3de',countClr:'#3b6d11'},
  {id:'sem-mostruario', label:'Sem kit separado',  hint:'Kit não bipado — investigar com supervisora.', countBg:'#f5ede9',countClr:'#7a5c3a'},
];

const SUPERVISORAS_FIXAS = ['Maria Fernanda', 'Cinthia', 'Gabrielly'];

let TOKEN = '';
let consultoras = [];
let supColorMap = {};
let obsLocal = JSON.parse(localStorage.getItem('cianita_obs') || '{}');
let acoesLocal = JSON.parse(localStorage.getItem('cianita_acoes') || '{}');
// Mapa manual de supervisoras: { consultora_id: 'Nome Supervisora' }
let supManual = JSON.parse(localStorage.getItem('cianita_sup') || '{}');

function salvarObsStorage() { localStorage.setItem('cianita_obs', JSON.stringify(obsLocal)); }
function salvarAcoesStorage() { localStorage.setItem('cianita_acoes', JSON.stringify(acoesLocal)); }
function salvarSupManual() { localStorage.setItem('cianita_sup', JSON.stringify(supManual)); }

function setStatus(msg, tipo) {
  const el = document.getElementById('status-bar');
  el.className = 'status-bar status-' + tipo;
  el.innerHTML = msg;
}

async function apiFetch(path) {
  const r = await fetch(PROXY + path, {
    headers: {'Content-Type':'application/json','Accept':'application/json','x-jueri-token':TOKEN}
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.message || 'HTTP ' + r.status);
  }
  return r.json();
}

async function buscarTodas(path) {
  let pagina = 1, todos = [];
  while (true) {
    const sep = path.includes('?') ? '&' : '?';
    const res = await apiFetch(path + sep + 'page=' + pagina + '&per_page=100');
    const data = res.data || res;
    if (!Array.isArray(data) || data.length === 0) break;
    todos = todos.concat(data);
    if (!res.next_page_url) break;
    pagina++;
  }
  return todos;
}

async function iniciarCarregamento() {
  TOKEN = document.getElementById('token-input').value.trim();
  if (!TOKEN) { setStatus('Cole o token antes de continuar.', 'error'); return; }
  localStorage.setItem('cianita_token', TOKEN);
  setStatus('<i class="ti ti-loader"></i> Conectando...', 'loading');
  try {
    await apiFetch('/status');
    await carregarDados();
  } catch(e) {
    setStatus('<i class="ti ti-lock"></i> Erro: ' + e.message, 'error');
  }
}

async function carregarDados() {
  try {
    setStatus('<i class="ti ti-loader"></i> Buscando consultoras...', 'loading');
    const revendedores = await buscarTodas('/revendedor?status=1');
    const apenasConsultoras = revendedores.filter(r => r.fk_tipo_revendedor_id === 2);

    const hoje = new Date();
    const ano = hoje.getFullYear();
    const mes = String(hoje.getMonth() + 1).padStart(2, '0');
    const dataIni = ano + '-' + mes + '-01';
    const ultimoDia = new Date(ano, hoje.getMonth() + 1, 0).getDate();
    const dataFim = ano + '-' + mes + '-' + String(ultimoDia).padStart(2, '0');
    document.getElementById('mes-label').textContent = '· ' + hoje.toLocaleString('pt-BR', {month:'long', year:'numeric'});

    setStatus('<i class="ti ti-loader"></i> Buscando pedidos...', 'loading');
    const [pedidosAbertos, pedidosMes] = await Promise.all([
      buscarTodas('/pedido?status=1'),
      buscarTodas('/pedido?data_criacao_inicial=' + dataIni + '&data_criacao_final=' + dataFim)
    ]);

    // Kit bipado + data de acerto
    const temKitAberto = {};
    const dataAcertoPorRev = {};
    pedidosAbertos.forEach(p => {
      if (!p.fk_revendedor_id) return;
      temKitAberto[p.fk_revendedor_id] = true;
      if (p.data_acerto) dataAcertoPorRev[p.fk_revendedor_id] = p.data_acerto;
    });

    // Vendas do mês
    const vendasPorRev = {};
    pedidosMes.forEach(p => {
      const rid = p.fk_revendedor_id;
      if (!rid) return;
      if (p.status === 'Aberto') {
        const val = parseFloat(p.valor_pre_baixa || 0);
        if (val > 0) vendasPorRev[rid] = (vendasPorRev[rid] || 0) + val;
      } else if (p.status === 'Baixado') {
        const val = parseFloat(p.valor_total || 0);
        if (val > 0) vendasPorRev[rid] = (vendasPorRev[rid] || 0) + val;
      }
    });

    // Popula supervisoras no filtro
    const selSup = document.getElementById('filtro-sup');
    selSup.innerHTML = '<option value="todas">Todas as supervisoras</option><option value="sem">Sem supervisora</option>';
    SUPERVISORAS_FIXAS.forEach(s => {
      const o = document.createElement('option');
      o.value = s; o.textContent = s;
      selSup.appendChild(o);
      supColorMap[s] = SUP_COLORS[SUPERVISORAS_FIXAS.indexOf(s) % SUP_COLORS.length];
    });

    const selNivel = document.getElementById('filtro-nivel');
    selNivel.innerHTML = '<option value="todos">Todos os níveis</option>';
    ['BRONZE','PRATA','OURO','DIAMANTE','EMBAIXADORA'].forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n.charAt(0) + n.slice(1).toLowerCase();
      selNivel.appendChild(o);
    });

    // Monta consultoras
    consultoras = apenasConsultoras.map(r => {
      const nome = r.nome || 'Consultora';
      const sup = supManual[r.id] || 'Sem supervisora';
      const vendas = vendasPorRev[r.id] || 0;
      const temKit = !!temKitAberto[r.id];
      const nivel = (r.level_revendedor || 'BRONZE').toUpperCase();
      const dataAcerto = dataAcertoPorRev[r.id] || null;
      return { id: r.id, nome, sup, vendas, temKit, nivel, telefone: r.telefone_1 || r.telefone_2 || '', dataAcerto };
    });

    document.getElementById('setup-wrap').style.display = 'none';
    document.getElementById('painel').style.display = 'block';
    document.getElementById('topbar-controls').style.display = 'flex';
    setStatus('', 'loading');
    renderKanban();

  } catch(e) {
    setStatus('<i class="ti ti-alert-circle"></i> Erro: ' + e.message, 'error');
  }
}

function coluna(c) {
  if (!c.temKit) return 'sem-mostruario';
  if (c.vendas === 0) return 'zerada';
  if (c.vendas < 500) return 'abaixo';
  return 'acima';
}

function initials(n) { return n.split(' ').slice(0,2).map(x => x[0] || '').join('').toUpperCase(); }
function fmtBRL(v) { return 'R$ ' + Math.round(v).toLocaleString('pt-BR'); }

function fmtAcerto(dataStr) {
  if (!dataStr) return null;
  const d = new Date(dataStr);
  if (isNaN(d)) return null;
  const hoje = new Date();
  hoje.setHours(0,0,0,0);
  d.setHours(0,0,0,0);
  const diff = Math.round((d - hoje) / (1000*60*60*24));
  const label = String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
  if (diff < 0) return {label, cls:'vencido', tip:'Acerto vencido'};
  if (diff === 0) return {label, cls:'hoje', tip:'Acerto hoje'};
  return {label, cls:'', tip:'Acerto em ' + diff + ' dias'};
}

function temContatoMes(id) {
  const obs = obsLocal[id] || [];
  const hoje = new Date();
  const mesAtual = hoje.getMonth();
  const anoAtual = hoje.getFullYear();
  return obs.some(o => {
    if (!o.data) return false;
    const partes = o.data.split('/');
    if (partes.length < 3) return false;
    const m = parseInt(partes[1]) - 1;
    const a = parseInt(partes[2]);
    return m === mesAtual && a === anoAtual;
  });
}

function renderKanban() {
  const sup = document.getElementById('filtro-sup').value;
  const niv = document.getElementById('filtro-nivel').value;
  const busca = document.getElementById('busca-nome').value.toLowerCase().trim();
  const contato = document.getElementById('filtro-contato').value;

  const filtradas = consultoras.filter(c => {
    if (sup === 'sem' && c.sup !== 'Sem supervisora') return false;
    if (sup !== 'todas' && sup !== 'sem' && c.sup !== sup) return false;
    if (niv !== 'todos' && c.nivel !== niv) return false;
    if (busca && !c.nome.toLowerCase().includes(busca)) return false;
    if (contato === 'com' && !temContatoMes(c.id)) return false;
    if (contato === 'sem' && temContatoMes(c.id)) return false;
    return true;
  });

  const kanban = document.getElementById('kanban');
  kanban.innerHTML = '';

  COLUNAS.forEach(col => {
    const cards = filtradas.filter(c => coluna(c) === col.id);
    const colEl = document.createElement('div');
    colEl.className = 'col';
    colEl.innerHTML = `
      <div class="col-header">
        <span class="col-title">${col.label}</span>
        <span class="col-count" style="background:${col.countBg};color:${col.countClr}">${cards.length}</span>
      </div>
      <div class="col-hint">${col.hint}</div>
      ${cards.length === 0 ? '<div class="empty-col">Nenhuma consultora</div>' : ''}
    `;
    cards.forEach(c => {
      const bg = AVATAR_BG[c.id % AVATAR_BG.length];
      const clr = AVATAR_CLR[c.id % AVATAR_CLR.length];
      const nstyle = NIVEL_STYLE[c.nivel] || {bg:'#faece7',color:'#712b13'};
      const sstyle = supColorMap[c.sup] || {bg:'#f5ede9',color:'#7a5c3a'};
      const semKit = col.id === 'sem-mostruario';
      const vendaSemKit = semKit && c.vendas > 0;
      const temObs = (obsLocal[c.id] || []).length > 0;
      const acoesPend = (acoesLocal[c.id] || []).filter(a => !a.done).length;
      const acerto = fmtAcerto(c.dataAcerto);
      const comContato = temContatoMes(c.id);

      const card = document.createElement('div');
      card.className = 'card';
      if (semKit) card.style.borderColor = '#e8d0c0';
      card.onclick = () => abrirModal(c.id);
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
          <div class="avatar" style="width:28px;height:28px;font-size:10px;background:${bg};color:${clr}">${initials(c.nome)}</div>
          <span class="card-name">${c.nome}</span>
        </div>
        <div style="margin-bottom:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span style="background:${sstyle.bg};color:${sstyle.color};padding:1px 6px;border-radius:20px;font-size:10px;font-weight:600">${c.sup}</span>
          ${acerto ? `<span class="acerto-chip ${acerto.cls}" title="${acerto.tip}"><i class="ti ti-calendar" style="font-size:9px"></i>${acerto.label}</span>` : ''}
        </div>
        ${semKit && !vendaSemKit ? `<div class="card-alert card-alert-warn"><i class="ti ti-alert-triangle"></i> Kit não bipado</div>` : ''}
        ${vendaSemKit ? `<div class="card-alert card-alert-danger"><i class="ti ti-alert-circle"></i> Vendas sem kit registrado</div>` : ''}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">
          <span class="nivel-badge" style="background:${nstyle.bg};color:${nstyle.color}">${c.nivel.charAt(0)+c.nivel.slice(1).toLowerCase()}</span>
          <div style="display:flex;align-items:center;gap:5px">
            ${comContato ? `<span title="Contato registrado este mês" style="font-size:10px;color:#3b6d11">✓</span>` : ''}
            ${temObs && !comContato ? '<div class="obs-dot"></div>' : ''}
            ${acoesPend > 0 ? `<span style="font-size:10px;color:#854f0b;font-weight:600">${acoesPend} ação</span>` : ''}
            <span style="font-size:11px;font-weight:600;color:${c.vendas===0?'#a32d2d':c.vendas<500?'#854f0b':'#3b6d11'}">${fmtBRL(c.vendas)}</span>
          </div>
        </div>
      `;
      colEl.appendChild(card);
    });
    kanban.appendChild(colEl);
  });
}

// Modal de atribuição de supervisoras
function abrirModalSupervisoras() {
  const modal = document.getElementById('modal-sup');
  const semSup = consultoras.filter(c => c.sup === 'Sem supervisora');
  const comSup = consultoras.filter(c => c.sup !== 'Sem supervisora');

  let html = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:1px solid #f0e4df">
      <div>
        <div class="sup-title">Atribuição de Supervisoras</div>
        <div class="sup-sub">Defina a supervisora de cada consultora. Salvo automaticamente no navegador.</div>
      </div>
      <button class="btn" onclick="fecharModalSup()" style="padding:5px 8px"><i class="ti ti-x"></i></button>
    </div>
  `;

  if (semSup.length > 0) {
    html += `<div style="font-size:11px;font-weight:600;color:#b5906b;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Sem supervisora (${semSup.length})</div>`;
    semSup.forEach(c => {
      html += `
        <div class="sup-consultora-item">
          <span style="font-size:12px;font-weight:500;flex:1">${c.nome}</span>
          <select class="sup-select" onchange="atribuirSupervisora(${c.id}, this.value)">
            <option value="">— Selecionar —</option>
            ${SUPERVISORAS_FIXAS.map(s => `<option value="${s}">${s}</option>`).join('')}
          </select>
        </div>
      `;
    });
  }

  if (comSup.length > 0) {
    html += `<div style="font-size:11px;font-weight:600;color:#b5906b;text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 8px">Com supervisora (${comSup.length})</div>`;
    comSup.forEach(c => {
      html += `
        <div class="sup-consultora-item">
          <span style="font-size:12px;font-weight:500;flex:1">${c.nome}</span>
          <select class="sup-select" onchange="atribuirSupervisora(${c.id}, this.value)">
            <option value="">— Remover —</option>
            ${SUPERVISORAS_FIXAS.map(s => `<option value="${s}" ${c.sup===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      `;
    });
  }

  modal.innerHTML = html;
  document.getElementById('overlay-sup').classList.add('open');
}

function atribuirSupervisora(id, sup) {
  if (sup) {
    supManual[id] = sup;
  } else {
    delete supManual[id];
  }
  salvarSupManual();
  const c = consultoras.find(x => x.id === id);
  if (c) c.sup = sup || 'Sem supervisora';
  renderKanban();
}

function fecharModalSup(e) {
  if (!e || e.target === document.getElementById('overlay-sup')) {
    document.getElementById('overlay-sup').classList.remove('open');
  }
}

function renderAcoes(id) {
  const lista = acoesLocal[id] || [];
  if (lista.length === 0) return '<div style="font-size:11px;color:#bbb;margin-bottom:6px">Nenhuma ação cadastrada.</div>';
  return lista.map((a, i) => `
    <div class="acao-item">
      <input type="checkbox" style="width:15px;height:15px;flex-shrink:0;cursor:pointer;accent-color:#b5906b" ${a.done ? 'checked' : ''} onchange="toggleAcao(${id},${i},this.checked)">
      <span class="${a.done ? 'acao-done' : ''}">${a.txt}</span>
    </div>
  `).join('');
}

function abrirModal(id) {
  const c = consultoras.find(x => x.id === id);
  if (!c) return;
  const bg = AVATAR_BG[c.id % AVATAR_BG.length];
  const clr = AVATAR_CLR[c.id % AVATAR_CLR.length];
  const nstyle = NIVEL_STYLE[c.nivel] || {bg:'#faece7',color:'#712b13'};
  const sstyle = supColorMap[c.sup] || {bg:'#f5ede9',color:'#7a5c3a'};
  const col = coluna(c);
  const colLabel = COLUNAS.find(x => x.id === col)?.label || '';
  const semKit = col === 'sem-mostruario';
  const vendaSemKit = semKit && c.vendas > 0;
  const obsList = obsLocal[id] || [];
  const acerto = fmtAcerto(c.dataAcerto);
  const comContato = temContatoMes(c.id);

  let alertaKit = '';
  if (semKit && !vendaSemKit) {
    alertaKit = `<div class="investig-box investig-warn"><i class="ti ti-alert-triangle"></i> Kit não bipado. Investigar com ${c.sup}: montar o kit ou encerrar o cadastro.</div>`;
  } else if (vendaSemKit) {
    alertaKit = `<div class="investig-box investig-danger"><i class="ti ti-alert-circle"></i> Vendas de ${fmtBRL(c.vendas)} sem kit bipado. Verificar urgentemente.</div>`;
  }

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <div class="avatar" style="width:40px;height:40px;font-size:13px;background:${bg};color:${clr}">${initials(c.nome)}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${c.nome}</div>
        <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap">
          <span style="background:${sstyle.bg};color:${sstyle.color};padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600">${c.sup}</span>
          <span class="nivel-badge" style="background:${nstyle.bg};color:${nstyle.color}">${c.nivel.charAt(0)+c.nivel.slice(1).toLowerCase()}</span>
          <span style="font-size:10px;color:#b5906b">${colLabel}</span>
          ${comContato ? `<span class="badge-contato badge-com-contato">✓ Contato este mês</span>` : `<span class="badge-contato badge-sem-contato">Sem contato este mês</span>`}
        </div>
      </div>
      <button class="btn" onclick="fecharModal()" style="padding:5px 8px"><i class="ti ti-x"></i></button>
    </div>
    ${alertaKit}
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-cell-label">Vendas do mês</div>
        <div class="info-cell-val" style="color:${c.vendas===0?'#a32d2d':c.vendas<500?'#854f0b':'#3b6d11'}">${fmtBRL(c.vendas)}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Kit bipado</div>
        <div class="info-cell-val" style="color:${c.temKit?'#3b6d11':'#a32d2d'}">${c.temKit ? 'Sim' : 'Não'}</div>
      </div>
      <div class="info-cell">
        <div class="info-cell-label">Data de acerto</div>
        <div class="info-cell-val" style="color:${acerto?(acerto.cls==='vencido'?'#a32d2d':acerto.cls==='hoje'?'#3b6d11':'#1a1a1a'):'#bbb'}">${acerto ? acerto.label : '—'}</div>
      </div>
      ${c.telefone ? `<div class="info-cell"><div class="info-cell-label">Telefone</div><div class="info-cell-val" style="font-size:12px">${c.telefone}</div></div>` : ''}
    </div>
    <div class="field-label"><i class="ti ti-notes" style="font-size:12px"></i> Observações de contato</div>
    <div id="obs-list-${id}">
      ${obsList.length === 0 ? '<div style="font-size:11px;color:#bbb;margin-bottom:6px">Nenhuma observação ainda.</div>' : obsList.map(o => `<div class="obs-item">${o.txt}<div class="obs-item-date">${o.data}</div></div>`).join('')}
    </div>
    <textarea id="nova-obs" placeholder="Registrar nova observação de contato..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="adicionarObs(${id})"><i class="ti ti-check"></i> Salvar observação</button>
    </div>
    <div class="field-label" style="margin-top:16px"><i class="ti ti-checkbox" style="font-size:12px"></i> Ações atribuídas</div>
    <div id="acoes-list-${id}">${renderAcoes(id)}</div>
    <textarea id="nova-acao" placeholder="Adicionar nova ação..."></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="adicionarAcao(${id})"><i class="ti ti-plus"></i> Adicionar ação</button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}

function toggleAcao(id, idx, val) {
  if (!acoesLocal[id]) acoesLocal[id] = [];
  acoesLocal[id][idx].done = val;
  salvarAcoesStorage();
  document.getElementById('acoes-list-' + id).innerHTML = renderAcoes(id);
  renderKanban();
}

function adicionarObs(id) {
  const txt = document.getElementById('nova-obs').value.trim();
  if (!txt) return;
  if (!obsLocal[id]) obsLocal[id] = [];
  const hoje = new Date();
  const data = String(hoje.getDate()).padStart(2,'0') + '/' + String(hoje.getMonth()+1).padStart(2,'0') + '/' + hoje.getFullYear();
  obsLocal[id].push({txt, data});
  salvarObsStorage();
  document.getElementById('nova-obs').value = '';
  document.getElementById('obs-list-' + id).innerHTML = obsLocal[id].map(o => `<div class="obs-item">${o.txt}<div class="obs-item-date">${o.data}</div></div>`).join('');
  renderKanban();
}

function adicionarAcao(id) {
  const txt = document.getElementById('nova-acao').value.trim();
  if (!txt) return;
  if (!acoesLocal[id]) acoesLocal[id] = [];
  acoesLocal[id].push({txt, done:false});
  salvarAcoesStorage();
  document.getElementById('nova-acao').value = '';
  document.getElementById('acoes-list-' + id).innerHTML = renderAcoes(id);
  renderKanban();
}

function fecharModal(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').classList.remove('open');
  }
}

function recarregar() {
  consultoras = [];
  document.getElementById('kanban').innerHTML = '';
  carregarDados();
}

function sair() {
  localStorage.removeItem('cianita_token');
  TOKEN = '';
  consultoras = [];
  document.getElementById('painel').style.display = 'none';
  document.getElementById('topbar-controls').style.display = 'none';
  document.getElementById('setup-wrap').style.display = 'flex';
  document.getElementById('token-input').value = '';
  document.getElementById('status-bar').className = 'status-bar';
}

const savedToken = localStorage.getItem('cianita_token');
if (savedToken) {
  TOKEN = savedToken;
  document.getElementById('token-input').value = savedToken;
}
</script>
